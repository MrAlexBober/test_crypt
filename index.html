<!DOCTYPE html>
<html>
<head>
  <title>LOL Chat</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      padding: 12px;
      min-height: 100vh;
    }

    h3 {
      font-size: 17px;
      margin-bottom: 12px;
      color: var(--tg-theme-text-color, #000);
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      background: var(--tg-theme-button-color, #1a73e8);
      color: var(--tg-theme-button-text-color, #fff);
      font-size: 14px;
      cursor: pointer;
    }

    #user-list {
      border: 1px solid var(--tg-theme-hint-color, #ccc);
      border-radius: 10px;
      margin-top: 10px;
      overflow: hidden;
    }

    .user-item {
      padding: 12px;
      border-bottom: 1px solid var(--tg-theme-secondary-bg-color, #eee);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--tg-theme-bg-color, #fff);
      transition: opacity 0.15s;
    }

    .user-item:active { opacity: 0.7; }
    .user-item:last-child { border-bottom: none; }

    .online-dot {
      width: 9px; height: 9px;
      background: #4caf50;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .user-name { font-size: 15px; font-weight: 500; }
    .user-username { font-size: 12px; color: var(--tg-theme-hint-color, #888); }

    #empty-msg {
      padding: 14px;
      color: var(--tg-theme-hint-color, #888);
      font-size: 14px;
      text-align: center;
    }

    /* CHAT SCREEN */
    #screen-chat { display: none; flex-direction: column; height: calc(100vh - 24px); }

    #chat-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    #back-btn {
      background: var(--tg-theme-secondary-bg-color, #eee);
      color: var(--tg-theme-text-color, #000);
      padding: 6px 12px;
      font-size: 13px;
    }

    #recipient-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--tg-theme-text-color, #000);
    }

    #chat-box {
      flex: 1;
      overflow-y: auto;
      border: 1px solid var(--tg-theme-hint-color, #ccc);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .msg {
      max-width: 75%;
      padding: 8px 12px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.4;
      word-break: break-word;
    }

    .msg.me {
      align-self: flex-end;
      background: var(--tg-theme-button-color, #1a73e8);
      color: var(--tg-theme-button-text-color, #fff);
      border-bottom-right-radius: 4px;
    }

    .msg.them {
      align-self: flex-start;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      border: 1px solid var(--tg-theme-hint-color, #ddd);
      border-bottom-left-radius: 4px;
    }

    #input-row {
      display: flex;
      gap: 8px;
    }

    #msg-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--tg-theme-hint-color, #ccc);
      border-radius: 20px;
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      color: var(--tg-theme-text-color, #000);
      font-size: 14px;
      outline: none;
    }

    #msg-input::placeholder { color: var(--tg-theme-hint-color, #aaa); }

    #send-btn { border-radius: 20px; }
  </style>
</head>
<body>

<div id="screen-online">
  <h3>Онлайн</h3>
  <button onclick="refreshList()">Обновить</button>
  <div id="user-list">
    <div id="empty-msg">Загрузка...</div>
  </div>
</div>

<div id="screen-chat">
  <div id="chat-header">
    <button id="back-btn" onclick="goBack()">← Назад</button>
    <div id="recipient-label"></div>
  </div>
  <div id="chat-box"></div>
  <div id="input-row">
    <input id="msg-input" placeholder="Сообщение..." />
    <button id="send-btn" onclick="sendMsg()">↑</button>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const me = tg.initDataUnsafe.user || {};
const myId = me.id;
const myUsername = me.username || "";
const myName = me.first_name || "Unknown";

let recipientId = null;
let recipientName = null;

async function joinOnline() {
    await fetch("/online/join", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ chat_id: myId, username: myUsername, first_name: myName })
    });
}

setInterval(async () => {
    await fetch("/online/ping", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ chat_id: myId })
    });
}, 10000);

window.addEventListener("beforeunload", () => {
    navigator.sendBeacon("/online/leave", JSON.stringify({ chat_id: myId }));
});

async function refreshList() {
    const res = await fetch("/online/list");
    const users = await res.json();
    const list = document.getElementById("user-list");
    const others = users.filter(u => String(u.chat_id) !== String(myId));
    if (others.length === 0) {
        list.innerHTML = '<div id="empty-msg">Никого онлайн</div>';
        return;
    }
    list.innerHTML = others.map(u => `
        <div class="user-item" onclick="startChat('${u.chat_id}', '${u.first_name}')">
            <div class="online-dot"></div>
            <div>
                <div class="user-name">${u.first_name}</div>
                ${u.username ? `<div class="user-username">@${u.username}</div>` : ""}
            </div>
        </div>
    `).join("");
}

function startChat(chatId, name) {
    recipientId = chatId;
    recipientName = name;
    document.getElementById("recipient-label").innerText = name;
    document.getElementById("screen-online").style.display = "none";
    const chatScreen = document.getElementById("screen-chat");
    chatScreen.style.display = "flex";
    document.getElementById("chat-box").innerHTML = "";
}

function goBack() {
    recipientId = null;
    document.getElementById("screen-online").style.display = "block";
    document.getElementById("screen-chat").style.display = "none";
    refreshList();
}

function addMessage(text, fromMe) {
    const box = document.getElementById("chat-box");
    const div = document.createElement("div");
    div.className = "msg " + (fromMe ? "me" : "them");
    div.innerText = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

async function sendMsg() {
    if (!recipientId) return;
    const input = document.getElementById("msg-input");
    const text = input.value.trim();
    if (!text) return;
    addMessage(text, true);
    input.value = "";
    await fetch("/send", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ chat_id: recipientId, from_id: myId, text: text })
    });
}

document.getElementById("msg-input").addEventListener("keydown", e => {
    if (e.key === "Enter") sendMsg();
});

async function pollMessages() {
    if (!myId) return;
    const res = await fetch("/messages/poll?chat_id=" + myId);
    const msgs = await res.json();
    for (const msg of msgs) {
        addMessage(msg.text, false);
    }
}

setInterval(pollMessages, 2000);

joinOnline();
refreshList();
</script>

</body>
</html>
